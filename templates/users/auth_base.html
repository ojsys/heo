{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HEO Eziokwu Foundation{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --green:      #02a65e;
            --green-dark: #018a4f;
            --dark:       #0f172a;
            --dark-2:     #1e293b;
            --gray:       #64748b;
            --border:     #e2e8f0;
            --surface:    #f8fafc;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: var(--surface);
            display: flex;
            flex-direction: column;
        }

        /* Back to home link */
        .auth-back {
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--dark-2);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .auth-back:hover {
            background: #fff;
            color: var(--green);
            border-color: var(--green);
            box-shadow: 0 4px 16px rgba(2,166,94,0.15);
        }

        /* Auth container */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem 3rem;
        }

        /* Auth card */
        .auth-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 920px;
            width: 100%;
            display: flex;
            min-height: 560px;
        }

        /* Sidebar */
        .auth-sidebar {
            width: 40%;
            flex-shrink: 0;
            background: linear-gradient(160deg, var(--dark) 0%, var(--dark-2) 100%);
            padding: 3rem 2.25rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .auth-sidebar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 20% 80%, rgba(2,166,94,0.2) 0%, transparent 70%);
        }

        .auth-sidebar > * { position: relative; z-index: 1; }

        .auth-sidebar .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .auth-sidebar .brand-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: rgba(2,166,94,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            color: #4ade80;
        }

        .auth-sidebar .brand-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            line-height: 1.2;
        }

        .auth-sidebar h2 {
            font-size: 1.625rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        .auth-sidebar .tagline {
            color: rgba(255,255,255,0.55);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .auth-feature-list {
            list-style: none;
            padding: 0; margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
        }

        .auth-feature-list li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: rgba(255,255,255,0.7);
        }

        .auth-feature-list .fi {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: rgba(2,166,94,0.15);
            border: 1px solid rgba(2,166,94,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
            color: #4ade80;
            flex-shrink: 0;
        }

        /* Form side */
        .auth-form-side {
            flex: 1;
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        .auth-logo-wrap {
            margin-bottom: 1.5rem;
        }

        .auth-logo-wrap img { max-height: 52px; width: auto; }

        .auth-form-side h3 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark);
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }

        .auth-subtitle {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        /* Inputs */
        .form-control {
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.9375rem;
            transition: all 0.25s ease;
        }

        .form-control:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(2,166,94,0.1);
            outline: none;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--dark-2);
            margin-bottom: 0.4rem;
        }

        .input-group-text {
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--gray);
        }

        .input-group .form-control:focus { z-index: 3; }

        /* Buttons */
        .btn-primary {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
            font-weight: 600;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            transition: all 0.25s ease;
        }

        .btn-primary:hover {
            background: var(--green-dark);
            border-color: var(--green-dark);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(2,166,94,0.3);
        }

        .btn-primary:disabled {
            background: var(--green);
            border-color: var(--green);
            opacity: 0.7;
        }

        .auth-link {
            color: var(--green);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-link:hover { color: var(--green-dark); text-decoration: underline; }

        /* Alerts */
        .alert { border-radius: 10px; border: none; font-size: 0.9rem; }
        .alert-danger   { background: #fef2f2; color: #991b1b; }
        .alert-success  { background: #f0fdf4; color: #166534; }
        .alert-info     { background: #eff6ff; color: #1d4ed8; }
        .alert-warning  { background: #fffbeb; color: #92400e; }

        /* Divider */
        .auth-divider {
            text-align: center;
            margin: 1.25rem 0;
            position: relative;
        }
        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px;
            background: var(--border);
        }
        .auth-divider span {
            position: relative;
            background: #fff;
            padding: 0 0.75rem;
            font-size: 0.8rem;
            color: var(--gray);
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-sidebar { display: none; }
            .auth-card {
                border-radius: 20px;
                min-height: auto;
            }
            .auth-form-side { padding: 2.5rem 1.75rem; }
            .auth-back { font-size: 0.8rem; padding: 0.4rem 0.875rem; }
        }

        @media (max-width: 480px) {
            .auth-form-side { padding: 2rem 1.25rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <a href="/" class="auth-back">
        <i class="fas fa-arrow-left" style="font-size:0.8em;"></i> Back to Home
    </a>

    <div class="auth-container">
        {% block auth_content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
